<html lang="en">

<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <span class="navbar-logo-gem">♦</span>
    <div class="navbar-logo-text">
      <div class="navbar-logo-title">OCJ</div>
      <div class="navbar-logo-sub">Save File</div>
    </div>
  </a>
  <ul class="navbar-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="sims.html">Sims</a></li>
    <li><a href="worlds.html">Worlds</a></li>
  </ul>
  <div class="navbar-right">
    <button class="theme-btn" id="themeBtn" title="Toggle Theme">☀</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu" aria-hidden="true">
  <a href="index.html">Home</a>
  <a href="sims.html">Sims</a>
  <a href="worlds.html">Worlds</a>
</div>

<div class="detail-page">

  <div class="page-header">
    <p class="page-eyebrow">Sim Profile</p>
    <h1 class="page-title" id="simName">Loading Sim...</h1>
    <div class="divider"></div>
    <p class="page-description" id="simSubtitle">Detailed sim profile and attributes.</p>
    <button type="button" class="detail-back-button">← Back</button>
  </div>

  <div class="detail-layout gallery-left">
    <div class="detail-main">
      <div class="gallery-main">
        <img id="mainImage" src="" alt="Sim image" loading="lazy" />
      </div>
      <div class="gallery-controls">
        <button class="gallery-btn" id="prevImage" type="button">‹</button>
        <button class="gallery-btn" id="nextImage" type="button">›</button>
      </div>
      <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>

    <div class="detail-aside">
      <div class="detail-panel">
        <h2>Attributes</h2>
        <div id="simAttributes" class="detail-attributes"></div>
      </div>
      <div class="detail-panel" id="petsSection">
        <h2>Pets</h2>
        <div class="pets-grid" id="petsGrid"></div>
      </div>
    </div>
  </div>

  <div class="loading-screen" id="loadingScreen">Loading sim...</div>
  <div class="error-state" id="errorState" style="display:none">Sim not found.</div>

</div>

<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/csv.js"></script>
<script src="js/utils.js"></script>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-title">OCJ Save File</p>
    <p class="footer-sub">Canonical Save Archive</p>
  </div>
</footer>

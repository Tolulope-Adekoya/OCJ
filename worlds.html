<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <span class="navbar-logo-gem">♦</span>
    <div class="navbar-logo-text">
      <div class="navbar-logo-title">OCJ</div>
      <div class="navbar-logo-sub">Save File</div>
    </div>
  </a>

  <ul class="navbar-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="sims.html">Sims</a></li>
    <li><a href="worlds.html">Worlds</a></li>
  </ul>

  <div class="navbar-right">
    <button class="theme-btn" id="themeBtn" title="Toggle Theme">☀</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>

</nav>

<!-- PAGE -->
<div class="worlds-page">

  <div class="page-header">
    <p class="page-eyebrow">The Places</p>
    <h1 class="page-title">Worlds</h1>
    <div class="divider"></div>
    <p class="page-count" id="worldCount">Loading...</p>
    <p class="page-description">Explore every world currently represented within the OCJ Save File.</p>
  </div>

  <div class="world-controls">
    <input id="worldSearch" class="search-input" type="text" placeholder="Search worlds..." />
    <select id="statusFilter" class="filter-select">
      <option value="">All Statuses</option>
    </select>
  </div>

  <div class="active-filters" id="activeFilters"></div>

  <div class="world-grid" id="worldGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    No worlds match your search criteria.
  </div>

</div>

<script src="js/navbar.js"></script>

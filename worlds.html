<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worlds — OCJ Save File</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">OCJ</div>
      <p class="logo-sub">Save File</p>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-label">Navigate</span>
      <ul>
        <li><a href="index.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">⌂</span> Home</span></a></li>
        <li><a href="worlds.html" class="nav-link active"><span class="nav-link-left"><span class="nav-icon">◈</span> Worlds</span><span class="nav-badge" id="badge-worlds">—</span></a></li>
        <li><a href="sims.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">◉</span> Sims</span><span class="nav-badge" id="badge-sims">—</span></a></li>
        <li><a href="lots.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">▣</span> Lots</span><span class="nav-badge" id="badge-lots">—</span></a></li>
        <li><a href="families.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">❧</span> Families</span></a></li>
        <li><a href="relationships.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">⬡</span> Relationships</span></a></li>
        <li><a href="statistics.html" class="nav-link"><span class="nav-link-left"><span class="nav-icon">◎</span> Statistics</span></a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <span class="mono-small">OCJ · 2025</span>
    </div>
  </aside>

  <main class="main">

    <div class="page-header">
      <div class="breadcrumb">OCJ / <span>Worlds</span></div>
      <h1 class="page-title"><em>Worlds</em></h1>
      <p class="page-subtitle">All active worlds in the save file, their completion status, and descriptions.</p>
      <div class="page-divider"></div>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-worlds" placeholder="Search worlds..." />
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="Complete">Complete</option>
        <option value="In Progress">In Progress</option>
        <option value="Not Started">Not Started</option>
      </select>
      <span class="filter-count" id="worlds-count"></span>
    </div>

    <div class="world-grid" id="worlds-grid">
      <!-- Populated by JS -->
      <div class="no-results">Loading worlds...</div>
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/worlds.js"></script>
</body>
</html>

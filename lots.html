<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="image/webdesign/favicons/favicon.png">
<title>Lots — OCJ Save File</title>
<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/navbar.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/lots.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <span class="navbar-logo-gem">♦</span>
    <div class="navbar-logo-text">
      <div class="navbar-logo-title">OCJ</div>
      <div class="navbar-logo-sub">Save File</div>
    </div>
  </a>
  <ul class="navbar-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="sims.html">Sims</a></li>
    <li><a href="worlds.html">Worlds</a></li>
  </ul>
  <div class="navbar-right">
    <button class="theme-btn" id="themeBtn" title="Toggle Theme">☀</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu" aria-hidden="true">
  <a href="index.html">Home</a>
  <a href="sims.html">Sims</a>
  <a href="worlds.html">Worlds</a>
</div>

<div class="lots-page">

  <div class="page-header">
    <p class="page-eyebrow">The Properties</p>
    <h1 class="page-title">Lots</h1>
    <div class="divider"></div>
    <p class="page-count" id="lotCount">Loading...</p>
    <p class="page-description">Browse every residential, commercial, community and special-use lot in the OCJ Save File.</p>
  </div>

  <div class="lots-controls">
    <div class="search-wrap">
      <input id="lotSearch" class="search-input" type="text" placeholder="Search Lots..." />
    </div>
    <button class="filter-toggle" id="filterToggle" aria-expanded="false" aria-controls="filterPanel">Filters</button>
  </div>

  <div class="active-filters" id="activeFilters"></div>

  <div class="filter-panel" id="filterPanel" aria-hidden="true">
    <div class="filter-panel-inner">
      <div class="filter-panel-header">
        <h3>Filters</h3>
        <button class="clear-all" id="clearFilters">Clear All</button>
        <button class="close-filter" id="closeFilterPanel" aria-label="Close filters">✕</button>
      </div>
      <div class="filter-grid">
        <div class="filter-group">
          <label>World</label>
          <select id="worldFilter" size="6"><option value="">All Worlds</option></select>
        </div>
        <div class="filter-group">
          <label>Lot Type</label>
          <select id="lotTypeFilter" size="6"><option value="">All Types</option></select>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="statusFilter" size="6"><option value="">All Statuses</option></select>
        </div>
        <div class="filter-group">
          <label>Lot Owner</label>
          <select id="ownerFilter" size="6"><option value="">All Owners</option></select>
        </div>
      </div>
    </div>
  </div>

  <div class="sort-bar">
    <label for="sortSelect">Sort By</label>
    <select id="sortSelect" class="sort-select">
      <option value="az">A–Z</option>
      <option value="za">Z–A</option>
      <option value="world">World</option>
      <option value="type">Type</option>
    </select>
  </div>

  <div class="lot-grid" id="lotGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">No lots match your search criteria.</div>

</div>

<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/csv.js"></script>
<script src="js/utils.js"></script>
<script src="js/details.js"></script>
<script src="js/lots.js"></script>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-title">OCJ Save File</p>
    <p class="footer-sub">Canonical Save Archive</p>
  </div>
</footer>

</body>
</html>

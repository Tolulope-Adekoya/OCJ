<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="css/theme.css" />
<link rel="stylesheet" href="css/navbar.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/statistics.css" />
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <span class="navbar-logo-gem">♦</span>
    <div class="navbar-logo-text">
      <div class="navbar-logo-title">OCJ</div>
      <div class="navbar-logo-sub">Save File</div>
    </div>
  </a>
  <ul class="navbar-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="sims.html">Sims</a></li>
    <li><a href="worlds.html">Worlds</a></li>
  </ul>
  <div class="navbar-right">
    <button class="theme-btn" id="themeBtn" title="Toggle Theme">☀</button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu" aria-hidden="true">
  <a href="index.html">Home</a>
  <a href="sims.html">Sims</a>
  <a href="worlds.html">Worlds</a>
</div>

<!-- PAGE -->
<div class="statistics-page">

  <div class="page-header">
    <p class="page-eyebrow">The Numbers</p>
    <h1 class="page-title">Statistics</h1>
    <div class="divider"></div>
    <p class="page-description">
      Explore the demographic, geographic and property
      distribution of the OCJ Save File through dynamic charts.
    </p>
  </div>

  <!-- DATASET SELECTOR -->
  <section class="stats-dataset-selector">
    <button class="dataset-btn active" data-dataset="sims">
      <span class="dataset-btn-label">Sims</span>
      <span class="dataset-btn-count" id="countSims">—</span>
    </button>
    <button class="dataset-btn" data-dataset="lots">
      <span class="dataset-btn-label">Lots</span>
      <span class="dataset-btn-count" id="countLots">—</span>
    </button>
    <button class="dataset-btn" data-dataset="worlds">
      <span class="dataset-btn-label">Worlds</span>
      <span class="dataset-btn-count" id="countWorlds">—</span>
    </button>
    <button class="dataset-btn" data-dataset="pets">
      <span class="dataset-btn-label">Pets</span>
      <span class="dataset-btn-count" id="countPets">—</span>
    </button>
  </section>

  <!-- CONTROLS -->
  <section class="stats-controls">

    <div class="control-group">
      <label for="rowsSelect">Rows</label>
      <div class="stats-select-wrap">
        <select id="rowsSelect"></select>
      </div>
    </div>

    <div class="control-group">
      <label for="columnsSelect">Columns</label>
      <div class="stats-select-wrap">
        <select id="columnsSelect"></select>
      </div>
    </div>

    <div class="control-group">
      <label>Chart Type</label>
      <div class="chart-type-group">
        <button class="chart-btn active" type="button" data-chart-type="bar">Bar</button>
        <button class="chart-btn" type="button" data-chart-type="pie"
          title="Disabled while a Columns field is set — pie charts only show one series.">Pie</button>
      </div>
    </div>

    <div class="control-group">
      <label for="topN">Display</label>
      <select id="topN">
        <option value="all">All Values</option>
        <option value="10">Top 10</option>
        <option value="20">Top 20</option>
        <option value="50">Top 50</option>
      </select>
    </div>

  </section>

</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-title">OCJ Save File</p>
    <p class="footer-sub">Canonical Save Archive</p>
  </div>
</footer>

<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/csv.js"></script>
<script src="js/utils.js"></script>
<script src="js/pivot-classifier.js"></script>
<script src="js/pivot-engine.js"></script>
<script src="js/statistics.js"></script>

</body>
</html>
